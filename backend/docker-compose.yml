version: "3.8"

services:
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: filingpulse_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-filingpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-filingpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: filingpulse_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # PYTHONPATH is not a secret, keep it here for clarity
      - PYTHONPATH=filingpulse
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  # Mailhog is a great developer utility for testing SMTP alerts locally without sending real emails
  mailhog:
    image: mailhog/mailhog:latest
    container_name: filingpulse_mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port (view sent emails in browser at http://localhost:8025)
    restart: always

volumes:
  postgres_data:
